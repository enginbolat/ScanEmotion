disabled_rules:
  - trailing_comma
  - multiple_closures_with_trailing_closure

opt_in_rules:
  - empty_count
  - empty_string
  - closure_spacing
  - contains_over_filter_count
  - contains_over_first_not_nil
  - first_where
  - last_where
  - toggle_bool
  - sorted_imports
  - redundant_nil_coalescing
  - identical_operands
  - modifier_order
  - prefer_self_type_over_type_of_self
  - unneeded_parentheses_in_closure_argument
  - yoda_condition
  - force_unwrapping

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 300
  error: 400

function_body_length:
  warning: 60
  error: 100

file_length:
  warning: 400
  error: 600

cyclomatic_complexity:
  warning: 10
  error: 20

identifier_name:
  min_length: 2
  max_length: 50
  excluded:
    - id
    - x
    - y

nesting:
  type_level: 2

trailing_whitespace:
  ignores_empty_lines: true

reporter: "xcode"

excluded:
  - ScanEmotionTests
  - "**/*.generated.swift"
